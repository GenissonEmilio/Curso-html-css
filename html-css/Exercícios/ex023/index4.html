<!DOCTYPE html>
<html lang="pt-Br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Tabela completa</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <table>
    <caption>Filmes favoritos</caption>
    <thead>
      <tr>
        <th>Grupo</th>
        <th>Nomes</th>
        <th colspan="3">Filmes</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <th rowspan="3">Mulheres</th>
        <td>Ana Maria Santos</td>
        <td>Alien</td>
        <td>Rambo</td>
        <td>Vingadores</td>
      </tr>
      <tr>
        <td>Beatriz Souza</td>
        <td>Rulk</td>
        <td>Inception</td>
        <td>Batman</td>
      </tr>
      <tr>
        <td>Cláudio Melo</td>
        <td>Oblivion</td>
        <td>Matrix</td>
        <td>Big Hero</td>
      </tr>
      <tr>
        <th rowspan="3">Homens</th>
        <td>Bruno Mendonça</td>
        <td>Intocáveis</td>
        <td>Aminesia</td>
        <td>Gladiadores</td>
      </tr>
      <tr>
        <td>Daniel Lourenço</td>
        <td>Wall-E</td>
        <td>Oldboy</td>
        <td>Dagal</td>
      </tr>
      <tr>
        <td>Fabiano Mota</td>
        <td>Star Wars V</td>
        <td>Taxi Driver</td>
        <td>Toy Story</td>
      </tr>
    </tbody>
  </table>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-Br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Formulários</title>
</head>
<body>
  <h1>Teste com formulários</h1>
  <form action="cadastro.js" method="get" autocomplete="on">
    <div>
      <label for="name">Nome</label>
      <input type="text" name="name" id="name" required minlength="5" maxlength="30" placeholder="Nome do usuário" autocomplete="name">
    </div>
    <div>
      <label for="media">Média</label>
      <input type="number" name="media" id="media" required min="0" max="10" placeholder="0 a 10" step="0.5">
    </div>
    <div>
      <input type="submit" value="Enviar">
      <input type="reset" value="Limpar">
    </div>
  </form>
</body>
</html>
